            <select
              id="categoryFilter"

                outline: none;

              <option value="Elektronik">Elektronik</option>
              <option value="Game">Game</option>
              <option value="Makanan">Makanan</option>
            </select>

              class="cart hover:scale-105 active:scale-95"
              onclick="toggleCart()"
              style="
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                cursor: pointer;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: #1c2a41;
                border: 1px solid rgba(255, 255, 255, 0.1);
                margin-left: 8px;
                transition: all 0.2s;

                  top: -5px;
                  right: -5px;
                  background: #ff8c00;
                  color: #4d2600;
                  font-size: 10px;

                  height: 18px;
                  display: flex;

                  justify-content: center;

        <div

      </header>

      <div class="content-wrapper">
        <!-- Cart Overlay -->

        <!-- Floating Cart Drawer -->

            <h3>Keranjang Belanja</h3>

          </div>
          <div id="cart-items" class="cart-items-container">

          </div>
          <div class="cart-footer">
            <div class="total-section">

              <span id="cart-total" class="total-amount">Rp 0</span>
            </div>
            <button class="btn-checkout" onclick="checkoutCart()">

            </button>

        </div>

          <div class="product-list"></div>

          <div class="pagination-info" id="pagination-info"></div>
          <div class="pagination" id="pagination"></div>
        </main>
      </div>
    </div>

      function getStoredReviews(id) {
        try {
          return JSON.parse(localStorage.getItem("reviews_" + id) || "[]");
        } catch (e) {
          return [];
        }
      }

      function calculateCombinedRating(id) {
        const stored = getStoredReviews(id);
        if (!stored.length) return { avg: 0, count: 0 };
        const sum = stored.reduce((s, r) => s + (r.rating || 0), 0);
        return {
          avg: Math.round((sum / stored.length) * 10) / 10,
          count: stored.length,
        };
      }

      function getFilteredProducts() {
        const searchVal = (
          document.getElementById("productSearch")?.value || ""
        ).toLowerCase();
        const categoryVal =
          document.getElementById("categoryFilter")?.value || "all";
        return productMapping[0].filter((p) => {
          const matchCat = categoryVal === "all" || p.category === categoryVal;
          const matchSearch = p.name.toLowerCase().includes(searchVal);
          return matchCat && matchSearch;
        });
      }

      function renderProducts() {
        const productList = document.querySelector(".product-list");
        if (!productList) return;

        const filtered = getFilteredProducts();
        const totalPages = Math.ceil(filtered.length / PRODUCTS_PER_PAGE);
        if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

        const start = (currentPage - 1) * PRODUCTS_PER_PAGE;
        const pageProducts = filtered.slice(start, start + PRODUCTS_PER_PAGE);

        productList.innerHTML = "";

        if (pageProducts.length === 0) {
          productList.innerHTML =
            '<p style="text-align:center;margin-top:40px;">Produk tidak ditemukan.</p>';
        } else {
          pageProducts.forEach((product) => {
            const combined = calculateCombinedRating(product.id);
            const starsHtml =
              typeof renderStars === "function"
                ? renderStars(combined.avg)
                : `${combined.avg}★`;

            const productDiv = document.createElement("div");
            productDiv.className = "product";
            productDiv.dataset.category = product.category;

            // ✅ URUTAN BENAR: gambar dulu di atas, baru teks di bawah
            productDiv.innerHTML = `
              <a href="product-detail.html?id=${product.id}" class="product-link">
                <div class="product-img-wrap">
                  <img src="${product.image}" alt="${product.name}"
                    onerror="this.style.opacity='0'">
                </div>
                <h3>${product.name}</h3>
                <p>Rp ${product.price.toLocaleString("id-ID")}</p>
                <div class="product-rating">
                  ${starsHtml}
                  <span>(${combined.count} ulasan)</span>
                </div>
              </a>
              <div class="actions">
                <button class="btn btn-buy" onclick="belisekarang('${product.name}', ${product.price})">Beli</button>
                <button class="btn btn-add" onclick="addToCart('${product.name}', ${product.price}, '${product.image}')">Tambah</button>
              </div>
            `;
            productList.appendChild(productDiv);
          });
        }

        renderPagination(filtered.length, totalPages);
        updateCartCount();
      }

      function renderPagination(totalItems, totalPages) {
        const info = document.getElementById("pagination-info");
        const container = document.getElementById("pagination");
        if (!container) return;

        const start = (currentPage - 1) * PRODUCTS_PER_PAGE + 1;
        const end = Math.min(currentPage * PRODUCTS_PER_PAGE, totalItems);
        info.textContent =
          totalItems > 0
            ? `Menampilkan ${start}–${end} dari ${totalItems} produk`
            : "";

        container.innerHTML = "";
        if (totalPages <= 1) return;

        const prevBtn = document.createElement("button");
        prevBtn.textContent = "<";
        prevBtn.disabled = currentPage === 1;
        prevBtn.onclick = () => {
          currentPage--;
          renderProducts();
          scrollToTop();
        };
        container.appendChild(prevBtn);

        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.textContent = i;
          if (i === currentPage) btn.classList.add("active");
          btn.onclick = () => {
            currentPage = i;
            renderProducts();
            scrollToTop();
          };
          container.appendChild(btn);
        }

        const nextBtn = document.createElement("button");
        nextBtn.textContent = ">";
        nextBtn.disabled = currentPage === totalPages;
        nextBtn.onclick = () => {
          currentPage++;
          renderProducts();
          scrollToTop();
        };
        container.appendChild(nextBtn);
      }

      function scrollToTop() {
        document
          .querySelector(".main-content")
          ?.scrollTo({ top: 0, behavior: "smooth" });
      }

      function onSearchOrFilter() {
        currentPage = 1;
        renderProducts();
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderProducts();
      });
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) renderProducts();
      });

      function toggleCart() {
        document.getElementById("cart-drawer").classList.toggle("active");
        document.getElementById("cart-overlay").classList.toggle("active");
      }
