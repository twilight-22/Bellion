<html>
    <head>
        <title>Bellion store</title>
        <link rel="stylesheet" href="bellion style.css">
    </head>
    <body>
        <div class="main-container">
            <!-- Header tetap di atas -->
            <header>
                <h2>BELLION STORE</h2>
                <nav class="nav">
                    <a href="homepage.html">Home</a>
                    <a href="login bellion store.html">Login</a>
                </nav>
            </header>

            <div class="content-wrapper">
                <!-- Sidebar Keranjang (tetap) -->
                <aside class="cart-sidebar">
                    <div class="cart-header">
                        <h3>Keranjang Belanja</h3>
                        <button class="close-cart-btn" onclick="toggleCart()" style="display:none;">✕</button>
                    </div>
                    <div id="cart-items"></div>
                    <div class="checkout-row">
                        <div class="total"><span>Total</span><span id="cart-total">Rp 0</span></div>
                        <button class="btn btn-buy checkout-btn" onclick="checkoutCart()">Checkout</button>
                    </div>
                </aside>

                <!-- Main Content (scrollable) -->
                <main class="main-content">
                    <!-- Search and Filter Section (tetap di atas) -->
                    <div class="search-filter-section">
                        <input type="text" id="productSearch" placeholder="Cari produk..." style="width:300px;padding:8px 12px;border:1px solid #ddd;border-radius:20px;font-size:13px;outline:none;" />
                        <select id="categoryFilter" style="padding:8px 12px;border:1px solid #ddd;border-radius:20px;font-size:13px;background:white;cursor:pointer;outline:none;">
                            <option value="all">Semua Kategori</option>
                            <option value="Fashion">Fashion</option>
                            <option value="Elektronik">Elektronik</option>
                            <option value="Game">Game</option>
                            <option value="Makanan">Makanan</option>
                        </select>
                        <!-- ICON KERANJANG -->
                        <div class="cart" onclick="toggleCart()">🛒
                            <span id="cart-count">0</span>
                        </div>
                    </div>

                    <!-- Product List (scrollable) -->
                    <div class="product-list">
                    </div>
                </main>
            </div>
        </div>

        <script src="bellion.js"></script>
        <script>
            // Render products dynamically with categories and ratings
            function renderProducts() {
                const productList = document.querySelector('.product-list');
                if (!productList || typeof productDataStore === 'undefined') return;

                function getStoredReviews(id) {
                    try {
                        return JSON.parse(localStorage.getItem('reviews_' + id) || '[]');
                    } catch (e) { return []; }
                }

                function calculateCombinedRating(id, storedReviews) {
                    if (!storedReviews || storedReviews.length === 0) {
                        return { avg: 0, count: 0 };
                    }
                    const sum = storedReviews.reduce((s, r) => s + (r.rating || 0), 0);
                    const avg = sum / storedReviews.length;
                    return { avg: Math.round(avg * 10) / 10, count: storedReviews.length };
                }

                productList.innerHTML = '';

                const productMapping = {
                    sepatu: { id: 'sepatu', name: 'Sepatu Casual Pria', price: 250000, image: 'image/Ortus-removebg-preview.png', category: 'Fashion' },
                    jaket: { id: 'jaket', name: 'Jaket Premium', price: 180000, image: 'image/jaket-removebg-preview.png', category: 'Fashion' },
                    SepatuPNTFL: { id: 'SepatuPNTFL', name: 'Sepatu Pantofel', price: 200000, image: 'image/sepatu_pantofel-removebg-preview.png', category: 'Fashion' },
                    Sweater: {id: 'Sweater', name: 'Sweater Abu-Abu', price: 120000, image: 'image/sweater-removebg-preview.png', category: 'Fashion'},
                    CelanaBahanHitam: {id: 'CelanaBahanHitam', name:'Celana Bahan Hitam', price: 150000, image: 'image/celana_bahan-removebg-preview.png',category: 'Fashion'},
                    CelanaGunung: {id: 'CelanaGunung', name:'Celana Gunung', price: 220000, image: 'image/celana_gunung-removebg-preview.png',category: 'Fashion'},
                    mouse: { id: 'mouse', name: 'Mouse Gaming', price: 150000, image: 'image/mouse-removebg-preview.png', category: 'Elektronik' },
                    PS4: { id: 'PS4', name: 'PlayStation 4 Uncharted 4', price: 3500000, image: 'image/ps4_unchrted4-removebg-preview.png', category: 'Elektronik' },
                    PSVR: { id: 'PSVR', name: 'PlayStation VR', price: 4500000, image: 'image/vr.webp', category: 'Elektronik' },
                    Monitor: {id: 'Monitor', name:'Monitor 24 inch OLED', price: 800000, image: 'image/monitor.avif',category: 'Elektronik'},
                    Keyboard: {id: 'Keyboard', name:'Keyboard Mechanical Abu-abu', price: 675000, image: 'image/keyboard_mechanical-removebg-preview.png',category: 'Elektronik'}, 
                    ModemROG: {id: 'ModemROG', name:'Modem ROG 1Gbps speed', price: 5000000, image: 'image/modem ROG.webp',category: 'Elektronik'},
                    bd1: { id: 'bd1', name: 'God Of War (PS4)', price: 170000, image: 'image/gow_crot-removebg-preview.png', category: 'Game' },
                    bd2: { id: 'bd2', name: 'Sekiro: Shadows Die Twice', price: 500000, image: 'image/OIP-removebg-preview.png', category: 'Game' },
                    bd3: { id: 'bd3', name: 'The Last Of Us Part II', price: 250000, image: 'image/tlou-removebg-preview.png', category: 'Game' },
                    bd4: { id: 'bd4', name: 'World War Zombie', price: 500000, image: 'image/WWZ-removebg-preview.png', category: 'Game' },
                    bd5: { id: 'bd5', name: 'God Of War II', price: 170000, image: 'image/GOW2-removebg-preview.png', category: 'Game' },
                    bd6: { id: 'bd6', name: 'God Of War III', price: 230000, image: 'image/GOW3-removebg-preview.png', category: 'Game' },
                    Beras10kilo: { id: 'Beras10kilo', name: 'Beras 10 Kilo', price: 100000, image: 'image/beras-removebg-preview.png', category: 'Makanan' }
                };
                
                Object.values(productMapping).forEach(product => {
                    // prefer lookup by id, fallback to name search
                    let productData = productDataStore[product.id];
                    if (!productData) {
                        const key = Object.keys(productDataStore).find(k => productDataStore[k].name === product.name);
                        productData = key ? productDataStore[key] : null;
                    }

                    const stored = getStoredReviews(product.id);
                    const combined = calculateCombinedRating(product.id, stored);
                    const starsHtml = (typeof renderStars === 'function') ? renderStars(combined.avg) : `${combined.avg}★`;

                    const productDiv = document.createElement('div');
                    productDiv.className = 'product';
                    productDiv.dataset.category = product.category;
                    productDiv.innerHTML = `
                        <a href="product-detail.html?id=${product.id}" class="product-link">
                            <h3>${product.name}</h3>
                            <img src="${product.image}" alt="${product.name}">
                            <p>Rp ${product.price.toLocaleString('id-ID')}</p>
                            <div style="margin-top:8px;font-size:12px;">
                                ${starsHtml} <span style="color:#A9A9A9;">• ${combined.count} ulasan</span>
                            </div>
                        </a>
                        <div class="actions">
                            <button class="btn btn-buy" onclick="belisekarang('${product.name}', ${product.price})">Beli</button>
                            <button class="btn btn-add" onclick="addToCart('${product.name}', ${product.price}, '${product.image}')">Tambah</button>
                        </div>
                    `;
                    productList.appendChild(productDiv);
                });
                
                filterProducts();
                updateCartCount();
            }
            
            // Render setelah DOM siap
            document.addEventListener('DOMContentLoaded', () => {
                renderProducts();
            });
            
            // Reload reviews saat kembali ke halaman (Page Visibility API)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    console.log('Rendering reviews on page return');
                    renderProducts();
                }
            });
        </script>
    </body>
</html>
