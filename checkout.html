<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout – Bellion Store</title>
    <link rel="stylesheet" href="check out.css" />
  </head>
  <body>
    <a class="back-link" href="bellion store.html">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M19 12H5M12 5l-7 7 7 7" />
      </svg>
      Kembali ke Toko
    </a>

    <div class="page">
      <div class="checkout-wrap">
        <!-- LEFT: Form -->
        <div>
          <div class="brand-header">
            <span class="brand-badge">SECURE CHECKOUT</span>
            <span class="brand-logo">BELLION</span>
            <span class="brand-sub">Bellion Store</span>
          </div>

          <div class="steps">
            <div class="step done">
              <div class="step-dot">✓</div>
              <div class="step-label">Keranjang</div>
            </div>
            <div class="step-line"></div>
            <div class="step active">
              <div class="step-dot">2</div>
              <div class="step-label">Checkout</div>
            </div>
            <div class="step-line"></div>
            <div class="step idle">
              <div class="step-dot">3</div>
              <div class="step-label">Selesai</div>
            </div>
          </div>

          <!-- Info Pembeli -->
          <div class="card">
            <div class="card-title">Informasi Pembeli</div>
            <div class="field-group">
              <div class="field-row">
                <div class="field">
                  <label>Nama Lengkap</label>
                  <div class="field-icon">
                    <span class="ico">👤</span>
                    <input
                      type="text"
                      id="namaPembeli"
                      placeholder="Nama kamu"
                    />
                  </div>
                </div>
                <div class="field">
                  <label>No. WhatsApp</label>
                  <div class="field-icon">
                    <span class="ico">📱</span>
                    <input type="tel" id="nomorWA" placeholder="08xxxxxxxxxx" />
                  </div>
                </div>
              </div>
              <div class="field">
                <label>Alamat Pengiriman</label>
                <div class="field-icon">
                  <span class="ico">📍</span>
                  <input
                    type="text"
                    id="alamat"
                    placeholder="Jl. Contoh No. 1, Kota"
                  />
                </div>
              </div>
            </div>
          </div>

          <!-- Metode Pembayaran -->
          <div class="card">
            <div class="card-title">Metode Pembayaran</div>
            <div class="payment-methods">
              <div
                class="pay-option selected"
                onclick="selectPayment(this, 'Transfer Bank')"
              >
                <span class="pay-icon">🏦</span>
                Transfer Bank
              </div>
              <div
                class="pay-option"
                onclick="selectPayment(this, 'COD - Bayar di Tempat')"
              >
                <span class="pay-icon">💵</span>
                COD
              </div>
            </div>

            <div class="bayar-section" id="bayarSection">
              <div class="field">
                <label>Jumlah Bayar (COD)</label>
                <input
                  type="number"
                  id="bayarInput"
                  placeholder="Masukkan nominal bayar"
                  oninput="hitungKembalian()"
                />
              </div>
              <div
                class="kembalian-box"
                id="kembalianBox"
                style="display: none"
              >
                <span>Kembalian</span>
                <span id="kembalianVal">—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT: Order Summary -->
        <div class="card" style="position: sticky; top: 24px">
          <div class="card-title">Ringkasan Pesanan</div>

          <div class="order-items" id="orderItems">
            <div class="empty-cart">
              <div class="icon">🛒</div>
              <div>Keranjang kosong</div>
            </div>
          </div>

          <div class="summary-rows">
            <div class="summary-row">
              <span>Subtotal</span>
              <span class="val" id="subtotalVal">Rp 0</span>
            </div>
            <div
              class="summary-row discount"
              id="discountRow"
              style="display: none"
            >
              <span>Diskon 🎉</span>
              <span class="val" id="discountVal">-Rp 0</span>
            </div>
            <div class="summary-row">
              <span>Pengiriman</span>
              <span class="val" style="color: var(--tertiary)">Gratis 🚀</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span class="val" id="totalVal">Rp 0</span>
            </div>
          </div>

          <button class="btn-checkout" onclick="prosesCheckout()">
            💬 Pesan via WhatsApp
          </button>
          <button class="btn-back" onclick="window.history.back()">
            ← Lanjut Belanja
          </button>

          <div class="secure-badge">
            <span class="lock">🔒</span>
            Transaksi aman & terpercaya
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const PHONE_NUMBER = "6283194941654";

      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let selectedPayment = "Transfer Bank";
      let totalAkhir = 0;

      function renderItems() {
        const container = document.getElementById("orderItems");

        if (cart.length === 0) {
          const params = new URLSearchParams(window.location.search);
          const nama = params.get("nama");
          const harga = params.get("harga");
          if (nama && harga) {
            cart = [
              { name: nama, price: parseFloat(harga), qty: 1, image: null },
            ];
            renderItems();
            return;
          }
          container.innerHTML = `<div class="empty-cart"><div class="icon">🛒</div><div>Keranjang kosong</div></div>`;
          hitungTotal();
          return;
        }

        container.innerHTML = cart
          .map(
            (item) => `
          <div class="order-item">
            <img src="${item.image || ""}" alt="${item.name}" onerror="this.style.display='none'">
            <div style="flex:1">
              <div class="item-name">${item.name}</div>
              <div class="item-qty">× ${item.qty}</div>
            </div>
            <div class="item-price">Rp ${(item.price * item.qty).toLocaleString("id-ID")}</div>
          </div>
        `,
          )
          .join("");

        hitungTotal();
      }

      function hitungTotal() {
        const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        let diskon = 0;
        if (subtotal >= 500000) diskon = subtotal * 0.1;
        else if (subtotal >= 300000) diskon = subtotal * 0.05;
        totalAkhir = subtotal - diskon;

        document.getElementById("subtotalVal").textContent =
          "Rp " + subtotal.toLocaleString("id-ID");
        document.getElementById("totalVal").textContent =
          "Rp " + totalAkhir.toLocaleString("id-ID");

        const discRow = document.getElementById("discountRow");
        if (diskon > 0) {
          discRow.style.display = "flex";
          document.getElementById("discountVal").textContent =
            "-Rp " + diskon.toLocaleString("id-ID");
        } else {
          discRow.style.display = "none";
        }
      }

      function selectPayment(el, method) {
        document
          .querySelectorAll(".pay-option")
          .forEach((o) => o.classList.remove("selected"));
        el.classList.add("selected");
        selectedPayment = method;

        const bayarSection = document.getElementById("bayarSection");
        if (method === "COD - Bayar di Tempat") {
          bayarSection.classList.add("show");
        } else {
          bayarSection.classList.remove("show");
          document.getElementById("kembalianBox").style.display = "none";
        }
      }

      function hitungKembalian() {
        const bayar =
          parseFloat(document.getElementById("bayarInput").value) || 0;
        const box = document.getElementById("kembalianBox");
        const val = document.getElementById("kembalianVal");
        if (bayar > 0) {
          box.style.display = "flex";
          const kembalian = bayar - totalAkhir;
          if (kembalian < 0) {
            box.classList.add("minus");
            val.textContent =
              "-Rp " + Math.abs(kembalian).toLocaleString("id-ID");
          } else {
            box.classList.remove("minus");
            val.textContent = "Rp " + kembalian.toLocaleString("id-ID");
          }
        } else {
          box.style.display = "none";
        }
      }

      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      function prosesCheckout() {
        const nama = document.getElementById("namaPembeli").value.trim();
        const wa = document.getElementById("nomorWA").value.trim();
        const alamat = document.getElementById("alamat").value.trim();

        if (!nama) {
          showToast("⚠️ Masukkan nama kamu dulu!", "error");
          return;
        }
        if (!wa) {
          showToast("⚠️ Masukkan nomor WhatsApp kamu!", "error");
          return;
        }
        if (!alamat) {
          showToast("⚠️ Masukkan alamat pengiriman!", "error");
          return;
        }
        if (cart.length === 0) {
          showToast("⚠️ Keranjang masih kosong!", "error");
          return;
        }

        const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        let diskon = 0;
        if (subtotal >= 500000) diskon = subtotal * 0.1;
        else if (subtotal >= 300000) diskon = subtotal * 0.05;
        const total = subtotal - diskon;

        let daftarItem = "";
        cart.forEach((item) => {
          daftarItem += `  • ${item.name} (×${item.qty}) — Rp ${(item.price * item.qty).toLocaleString("id-ID")}\n`;
        });

        let pesan = `PESANAN BARU – BELLION STORE\n`;
        pesan += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        pesan += `Nama: ${nama}\n`;
        pesan += `No. WA: ${wa}\n`;
        pesan += `Alamat: ${alamat}\n`;
        pesan += `Pembayaran: ${selectedPayment}\n\n`;
        pesan += `Detail Pesanan:\n${daftarItem}\n`;
        pesan += `━━━━━━━━━━━━━━━━━━━━\n`;
        pesan += `Subtotal: Rp ${subtotal.toLocaleString("id-ID")}\n`;
        if (diskon > 0)
          pesan += `Diskon: -Rp ${diskon.toLocaleString("id-ID")}\n`;
        pesan += `Total: Rp ${total.toLocaleString("id-ID")}\n\n`;
        pesan += `Mohon konfirmasi pesanan saya ya kak!`;

        const url = `https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent(pesan)}`;
        window.open(url, "_blank");
        showToast("✅ Membuka WhatsApp...", "success");
      }

      renderItems();
    </script>
  </body>
</html>
