<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout – Bellion Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --muted: #2d4a6e;
        --muted-text: #1e3a5f;
        --text: #0d1f3c;
        --accent: #ff6a00;
        --accent-2: #e85d00;
        --glass: rgba(255, 255, 255, 0.45);
        --glass-border: rgba(255, 255, 255, 0.6);
        --radius: 16px;
        --ease: cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100vh;
        font-family: "DM Sans", sans-serif;
        background: linear-gradient(180deg, #4da6ff 10%, #6366f1 97%);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      /* Noise overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      /* Glow blobs */
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
      }
      .blob-1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(77, 166, 255, 0.25) 0%,
          transparent 70%
        );
        top: -100px;
        right: -100px;
      }
      .blob-2 {
        width: 350px;
        height: 350px;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.25) 0%,
          transparent 70%
        );
        bottom: -100px;
        left: -80px;
      }

      /* Back link */
      .back-link {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted-text);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--accent);
      }
      .back-link svg {
        width: 16px;
        height: 16px;
      }

      /* Page layout */
      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px 40px;
      }

      .checkout-wrap {
        width: 100%;
        max-width: 920px;
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 24px;
        align-items: start;
      }

      /* Cards */
      .card {
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 20px;
        padding: 28px;
        box-shadow:
          0 8px 32px rgba(10, 40, 100, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(16px);
      }

      .card-title {
        font-family: "Syne", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .card-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(255, 106, 0, 0.4), transparent);
      }

      /* Brand header */
      .brand-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .brand-logo {
        font-family: "Syne", sans-serif;
        font-size: 32px;
        font-weight: 800;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 2px;
        display: block;
      }
      .brand-sub {
        font-size: 12px;
        color: var(--muted-text);
        letter-spacing: 1px;
        margin-top: 4px;
      }

      /* Steps indicator */
      .steps {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        margin-bottom: 28px;
      }
      .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .step-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
      }
      .step.done .step-dot {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #061025;
      }
      .step.active .step-dot {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #061025;
        box-shadow: 0 0 20px rgba(255, 106, 0, 0.4);
      }
      .step.idle .step-dot {
        background: rgba(255, 255, 255, 0.5);
        color: var(--muted-text);
        border: 1px solid rgba(10, 40, 100, 0.2);
      }
      .step-label {
        font-size: 10px;
        color: var(--muted-text);
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      .step.active .step-label {
        color: var(--accent);
      }
      .step-line {
        width: 60px;
        height: 1px;
        background: rgba(10, 40, 100, 0.15);
        margin-bottom: 20px;
        align-self: flex-start;
        margin-top: 16px;
      }

      /* Form fields */
      .field-group {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 20px;
      }
      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted-text);
      }
      .field input,
      .field select,
      .field textarea {
        padding: 13px 16px;
        border-radius: 12px;
        border: 1.5px solid rgba(10, 40, 100, 0.15);
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.25s var(--ease),
          box-shadow 0.25s var(--ease),
          background 0.25s;
        width: 100%;
        -webkit-appearance: none;
      }
      .field input[readonly] {
        opacity: 0.7;
        cursor: default;
        color: var(--accent);
        font-weight: 600;
      }
      .field input::placeholder {
        color: rgba(13, 31, 60, 0.35);
      }
      .field input:focus {
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.15);
      }

      .field-icon {
        position: relative;
      }
      .field-icon input {
        padding-left: 44px;
      }
      .field-icon .ico {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted-text);
        font-size: 16px;
        pointer-events: none;
      }

      /* Cart items */
      .order-items {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 280px;
        overflow-y: auto;
        padding-right: 4px;
      }
      .order-items::-webkit-scrollbar {
        width: 4px;
      }
      .order-items::-webkit-scrollbar-track {
        background: transparent;
      }
      .order-items::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 4px;
      }

      .order-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(10, 40, 100, 0.1);
        border-radius: 12px;
        transition: background 0.2s;
      }
      .order-item:hover {
        background: rgba(255, 255, 255, 0.85);
      }
      .order-item img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        flex-shrink: 0;
      }
      .item-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }
      .item-qty {
        font-size: 11px;
        color: var(--muted-text);
        margin-top: 3px;
      }
      .item-price {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent-2);
        white-space: nowrap;
      }

      .empty-cart {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted-text);
        font-size: 13px;
      }
      .empty-cart .icon {
        font-size: 36px;
        margin-bottom: 10px;
      }

      /* Summary rows */
      .summary-rows {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 16px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: var(--muted-text);
      }
      .summary-row.total {
        padding-top: 12px;
        border-top: 1px solid rgba(10, 40, 100, 0.12);
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }
      .summary-row .val {
        color: var(--text);
        font-weight: 500;
      }
      .summary-row.total .val {
        font-size: 20px;
        font-weight: 800;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .summary-row.discount .val {
        color: #4ade80;
      }

      /* Payment method */
      .payment-methods {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 4px;
      }
      .pay-option {
        padding: 12px 8px;
        border-radius: 12px;
        border: 1.5px solid rgba(10, 40, 100, 0.15);
        background: rgba(255, 255, 255, 0.6);
        text-align: center;
        cursor: pointer;
        transition: all 0.2s var(--ease);
        font-size: 12px;
        font-weight: 600;
        color: var(--muted-text);
      }
      .pay-option .pay-icon {
        font-size: 20px;
        display: block;
        margin-bottom: 5px;
      }
      .pay-option:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .pay-option.selected {
        border-color: var(--accent);
        background: rgba(255, 106, 0, 0.1);
        color: var(--accent);
        box-shadow: 0 0 0 3px rgba(255, 106, 0, 0.1);
      }

      /* Checkout button */
      .btn-checkout {
        width: 100%;
        padding: 16px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: #061025;
        box-shadow: 0 12px 32px rgba(255, 106, 0, 0.3);
        transition: all 0.3s var(--ease);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 16px;
        position: relative;
        overflow: hidden;
      }
      .btn-checkout::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        opacity: 0;
        transition: opacity 0.3s;
      }
      .btn-checkout:hover {
        transform: translateY(-3px);
        box-shadow: 0 18px 40px rgba(255, 106, 0, 0.4);
      }
      .btn-checkout:hover::before {
        opacity: 1;
      }
      .btn-checkout:active {
        transform: translateY(-1px);
      }
      .btn-checkout .wa-icon {
        font-size: 20px;
      }

      .btn-back {
        width: 100%;
        padding: 13px;
        border-radius: 14px;
        border: 1.5px solid rgba(10, 40, 100, 0.2);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.5);
        color: var(--muted-text);
        transition: all 0.2s;
        margin-top: 10px;
      }
      .btn-back:hover {
        background: rgba(255, 255, 255, 0.8);
        color: var(--text);
        border-color: rgba(10, 40, 100, 0.35);
      }

      /* Secure badge */
      .secure-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 14px;
        font-size: 11px;
        color: var(--muted-text);
      }
      .secure-badge .lock {
        color: #16a34a;
      }

      /* Input bayar extra */
      .bayar-section {
        display: none;
        flex-direction: column;
        gap: 14px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(10, 40, 100, 0.12);
        animation: fadeUp 0.3s var(--ease);
      }
      .bayar-section.show {
        display: flex;
      }

      .kembalian-box {
        padding: 12px 16px;
        border-radius: 12px;
        background: rgba(74, 222, 128, 0.08);
        border: 1px solid rgba(74, 222, 128, 0.2);
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        font-weight: 600;
      }
      .kembalian-box .val {
        color: #4ade80;
      }
      .kembalian-box.minus {
        background: rgba(255, 100, 100, 0.08);
        border-color: rgba(255, 100, 100, 0.2);
      }
      .kembalian-box.minus .val {
        color: #f87171;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        padding: 14px 20px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        z-index: 9999;
        transform: translateX(140%);
        transition: transform 0.4s var(--ease);
        display: flex;
        align-items: center;
        gap: 10px;
        max-width: 320px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.success {
        background: #1a3a28;
        border: 1px solid rgba(74, 222, 128, 0.3);
        color: #4ade80;
      }
      .toast.error {
        background: #3a1a1a;
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: #f87171;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 760px) {
        .checkout-wrap {
          grid-template-columns: 1fr;
          max-width: 480px;
        }
        .field-row {
          grid-template-columns: 1fr;
        }
        .payment-methods {
          grid-template-columns: repeat(3, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <a class="back-link" href="bellion store.html">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M19 12H5M12 5l-7 7 7 7" />
      </svg>
      Kembali ke Toko
    </a>

    <div class="page">
      <div class="checkout-wrap">
        <!-- LEFT: Form -->
        <div>
          <div class="brand-header">
            <span class="brand-logo">BELLION</span>
            <span class="brand-sub">SECURE CHECKOUT</span>
          </div>

          <div class="steps">
            <div class="step done">
              <div class="step-dot">✓</div>
              <div class="step-label">Keranjang</div>
            </div>
            <div class="step-line"></div>
            <div class="step active">
              <div class="step-dot">2</div>
              <div class="step-label">Checkout</div>
            </div>
            <div class="step-line"></div>
            <div class="step idle">
              <div class="step-dot">3</div>
              <div class="step-label">Selesai</div>
            </div>
          </div>

          <!-- Info Pembeli -->
          <div class="card" style="margin-bottom: 16px">
            <div class="card-title">Informasi Pembeli</div>
            <div class="field-group">
              <div class="field-row">
                <div class="field">
                  <label>Nama Lengkap</label>
                  <div class="field-icon">
                    <span class="ico">👤</span>
                    <input
                      type="text"
                      id="namaPembeli"
                      placeholder="Nama kamu"
                    />
                  </div>
                </div>
                <div class="field">
                  <label>No. WhatsApp</label>
                  <div class="field-icon">
                    <span class="ico">📱</span>
                    <input type="tel" id="nomorWA" placeholder="08xxxxxxxxxx" />
                  </div>
                </div>
              </div>
              <div class="field">
                <label>Alamat Pengiriman</label>
                <div class="field-icon">
                  <span class="ico">📍</span>
                  <input
                    type="text"
                    id="alamat"
                    placeholder="Jl. Contoh No. 1, Kota"
                  />
                </div>
              </div>
            </div>
          </div>

          <!-- Pembayaran -->
          <div class="card">
            <div class="card-title">Metode Pembayaran</div>
            <div class="payment-methods">
              <div
                class="pay-option selected"
                onclick="selectPayment(this, 'Transfer Bank')"
              >
                <span class="pay-icon">🏦</span>
                Transfer
              </div>
              <div
                class="pay-option"
                onclick="selectPayment(this, 'COD - Bayar di Tempat')"
              >
                <span class="pay-icon">💵</span>
                COD
              </div>
            </div>

            <!-- Bayar section (untuk COD) -->
            <div class="bayar-section" id="bayarSection">
              <div class="field">
                <label>Jumlah Bayar (COD)</label>
                <input
                  type="number"
                  id="bayarInput"
                  placeholder="Masukkan nominal bayar"
                  oninput="hitungKembalian()"
                />
              </div>
              <div
                class="kembalian-box"
                id="kembalianBox"
                style="display: none"
              >
                <span>Kembalian</span>
                <span class="val" id="kembalianVal">—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT: Order Summary -->
        <div class="card" style="position: sticky; top: 24px">
          <div class="card-title">Ringkasan Pesanan</div>

          <!-- Item list -->
          <div class="order-items" id="orderItems">
            <div class="empty-cart">
              <div class="icon">🛒</div>
              <div>Keranjang kosong</div>
            </div>
          </div>

          <!-- Summary -->
          <div class="summary-rows">
            <div class="summary-row">
              <span>Subtotal</span>
              <span class="val" id="subtotalVal">Rp 0</span>
            </div>
            <div
              class="summary-row discount"
              id="discountRow"
              style="display: none"
            >
              <span>Diskon 🎉</span>
              <span class="val" id="discountVal">-Rp 0</span>
            </div>
            <div class="summary-row">
              <span>Pengiriman</span>
              <span class="val" style="color: #fbbf24">Gratis 🚀</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span class="val" id="totalVal">Rp 0</span>
            </div>
          </div>

          <!-- Checkout button -->
          <button class="btn-checkout" onclick="prosesCheckout()">
            <span class="wa-icon">💬</span>
            Pesan via WhatsApp
          </button>
          <button class="btn-back" onclick="window.history.back()">
            ← Lanjut Belanja
          </button>

          <div class="secure-badge">
            <span class="lock">🔒</span>
            Transaksi aman & terpercaya
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
      const PHONE_NUMBER = "6283194941654"; // Nomor WA toko

      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let selectedPayment = "Transfer Bank";
      let totalAkhir = 0;

      // ---- Render items ----
      function renderItems() {
        const container = document.getElementById("orderItems");
        const itemsToShow = cart.length > 0 ? cart : [];

        if (itemsToShow.length === 0) {
          // Cek query param (single item dari "Beli Sekarang")
          const params = new URLSearchParams(window.location.search);
          const nama = params.get("nama");
          const harga = params.get("harga");
          if (nama && harga) {
            cart = [
              { name: nama, price: parseFloat(harga), qty: 1, image: null },
            ];
            renderItems();
            return;
          }
          container.innerHTML = `<div class="empty-cart"><div class="icon">🛒</div><div>Keranjang kosong</div></div>`;
          hitungTotal();
          return;
        }

        container.innerHTML = itemsToShow
          .map(
            (item) => `
        <div class="order-item">
          <img src="${item.image || ""}" alt="${item.name}" onerror="this.style.display='none'">
          <div style="flex:1">
            <div class="item-name">${item.name}</div>
            <div class="item-qty">× ${item.qty}</div>
          </div>
          <div class="item-price">Rp ${(item.price * item.qty).toLocaleString("id-ID")}</div>
        </div>
      `,
          )
          .join("");

        hitungTotal();
      }

      // ---- Hitung total ----
      function hitungTotal() {
        const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);

        let diskon = 0;
        if (subtotal >= 500000) diskon = subtotal * 0.1;
        else if (subtotal >= 300000) diskon = subtotal * 0.05;

        totalAkhir = subtotal - diskon;

        document.getElementById("subtotalVal").textContent =
          "Rp " + subtotal.toLocaleString("id-ID");
        document.getElementById("totalVal").textContent =
          "Rp " + totalAkhir.toLocaleString("id-ID");

        const discRow = document.getElementById("discountRow");
        if (diskon > 0) {
          discRow.style.display = "flex";
          document.getElementById("discountVal").textContent =
            "-Rp " + diskon.toLocaleString("id-ID");
        } else {
          discRow.style.display = "none";
        }
      }

      // ---- Payment method ----
      function selectPayment(el, method) {
        document
          .querySelectorAll(".pay-option")
          .forEach((o) => o.classList.remove("selected"));
        el.classList.add("selected");
        selectedPayment = method;

        const bayarSection = document.getElementById("bayarSection");
        if (method === "COD - Bayar di Tempat") {
          bayarSection.classList.add("show");
        } else {
          bayarSection.classList.remove("show");
          document.getElementById("kembalianBox").style.display = "none";
        }
      }

      // ---- Kembalian (COD) ----
      function hitungKembalian() {
        const bayar =
          parseFloat(document.getElementById("bayarInput").value) || 0;
        const box = document.getElementById("kembalianBox");
        const val = document.getElementById("kembalianVal");

        if (bayar > 0) {
          box.style.display = "flex";
          const kembalian = bayar - totalAkhir;
          val.textContent = "Rp " + Math.abs(kembalian).toLocaleString("id-ID");
          if (kembalian < 0) {
            box.classList.add("minus");
            val.textContent =
              "-Rp " + Math.abs(kembalian).toLocaleString("id-ID");
          } else {
            box.classList.remove("minus");
          }
        } else {
          box.style.display = "none";
        }
      }

      // ---- Toast ----
      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      // ---- Proses Checkout → WhatsApp ----
      function prosesCheckout() {
        const nama = document.getElementById("namaPembeli").value.trim();
        const wa = document.getElementById("nomorWA").value.trim();
        const alamat = document.getElementById("alamat").value.trim();

        if (!nama) {
          showToast("⚠️ Masukkan nama kamu dulu!", "error");
          return;
        }
        if (!wa) {
          showToast("⚠️ Masukkan nomor WhatsApp kamu!", "error");
          return;
        }
        if (!alamat) {
          showToast("⚠️ Masukkan alamat pengiriman!", "error");
          return;
        }
        if (cart.length === 0) {
          showToast("⚠️ Keranjang masih kosong!", "error");
          return;
        }

        const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
        let diskon = 0;
        if (subtotal >= 500000) diskon = subtotal * 0.1;
        else if (subtotal >= 300000) diskon = subtotal * 0.05;
        const total = subtotal - diskon;

        // Build WA message
        let daftarItem = "";
        cart.forEach((item) => {
          daftarItem += `  • ${item.name} (×${item.qty}) — Rp ${(item.price * item.qty).toLocaleString("id-ID")}\n`;
        });

        let pesan = `PESANAN BARU – BELLION STORE\n`;
        pesan += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        pesan += `Nama:${nama}\n`;
        pesan += `No. WA:${wa}\n`;
        pesan += `Alamat:${alamat}\n`;
        pesan += `Pembayaran:${selectedPayment}\n\n`;
        pesan += `Detail Pesanan:\n${daftarItem}\n`;
        pesan += `━━━━━━━━━━━━━━━━━━━━\n`;
        pesan += `Subtotal: Rp ${subtotal.toLocaleString("id-ID")}\n`;
        if (diskon > 0)
          pesan += `Diskon: -Rp ${diskon.toLocaleString("id-ID")}\n`;
        pesan += `Total: Rp ${total.toLocaleString("id-ID")}\n\n`;
        pesan += `Mohon konfirmasi pesanan saya ya kak!`;

        const url = `https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent(pesan)}`;
        window.open(url, "_blank");

        showToast("✅ Membuka WhatsApp...", "success");
      }

      // Init
      renderItems();
    </script>
  </body>
</html>
